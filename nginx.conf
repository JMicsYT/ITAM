# ============================================================
# Nginx Reverse Proxy — ITAM (On-Premise)
# Путь: /etc/nginx/sites-available/itam
# Активация: ln -s /etc/nginx/sites-available/itam /etc/nginx/sites-enabled/itam
#            nginx -t && systemctl reload nginx
# ============================================================
#
# Генерация самоподписанного SSL-сертификата (для PWA):
#   sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/ssl/itam/itam.key \
#     -out    /etc/ssl/itam/itam.crt \
#     -subj "/CN=itam.local/O=IT Department/C=RU"
#
#   sudo mkdir -p /etc/ssl/itam
#   (выполните команду выше после создания директории)
#
# После установки сертификата браузер выдаст предупреждение — нажмите
# "Дополнительно → Всё равно перейти" или добавьте сертификат
# в хранилище доверенных сертификатов Windows/Linux.
# ============================================================

# Перенаправление HTTP → HTTPS
server {
    listen 80;
    server_name itam.local _;   # Замените itam.local на ваш внутренний IP или hostname

    return 301 https://$host$request_uri;
}

# HTTPS: статика + API proxy
server {
    listen 443 ssl http2;
    server_name itam.local _;   # Замените itam.local на ваш внутренний IP или hostname

    # ── SSL ───────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/itam/itam.crt;
    ssl_certificate_key /etc/ssl/itam/itam.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Безопасность ──────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Статический фронтенд (собранный Vite) ─────────────────
    root /opt/itam/frontend/dist;   # ← Путь к папке dist после npm run build
    index index.html;

    location / {
        # SPA: все неизвестные пути отдают index.html
        try_files $uri $uri/ /index.html;

        # Кэширование статики
        location ~* \.(js|css|woff2?|png|svg|ico|webmanifest)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API Proxy → Node.js бэкенд ────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;   # Порт бэкенда из .env (PORT=3001)
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Таймауты для долгих запросов (экспорт CSV)
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Отключаем буферизацию для стриминга
        proxy_buffering off;
    }

    # ── Healthcheck эндпоинт ──────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_set_header Host $host;
    }

    # ── Ограничение размера загружаемых файлов ────────────────
    client_max_body_size 10M;

    # ── Gzip-сжатие ───────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
}
